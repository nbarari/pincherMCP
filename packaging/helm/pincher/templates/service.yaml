apiVersion: v1
kind: Service
metadata:
  name: {{ include "pincher.fullname" . }}
  labels:
    {{- include "pincher.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - name: http
      port: {{ .Values.service.httpPort }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "pincher.selectorLabels" . | nindent 4 }}
