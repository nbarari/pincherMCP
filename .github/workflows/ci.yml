name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            test-flags: -timeout 120s
          - os: macos-latest
            test-flags: -timeout 120s
          - os: windows-latest
            # Windows SQLite I/O is ~10x slower per package. Was -p 1
            # (full serial); trying -p 2 — tests use unique temp dirs
            # so concurrent packages shouldn't contend on SQLite, and
            # halving the package-level wall time should cut Windows
            # job from ~7min toward ~4min. Revert to -p 1 if flakes
            # emerge from WAL-file lock contention or runner memory
            # pressure.
            test-flags: -timeout 300s -p 2

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # `go test` runs `go vet` automatically (with a slightly narrower
      # default check set than `go vet ./...`). We don't pass -vet=off,
      # so the standalone vet step would just re-run the same analysers
      # — pure duplication, ~10-30s on Windows. If you want stricter
      # vet coverage, pass -vet=all to `go test` instead.
      - name: Test
        run: go test ./... ${{ matrix.test-flags }}

      - name: Build
        run: go build ./cmd/pinch/

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # Subprocess-coverage instrumentation (#185): tests in cmd/pinch
      # build pincher binaries on the fly and exec them via exec.Cmd to
      # exercise runXxxCLI dispatch wrappers. The `buildPincherBinary`
      # helper checks `os.Getenv("GOCOVERDIR")` — when set, it builds
      # the binary with `-cover -coverpkg=./...` so subprocesses emit
      # raw counter files. Go's test runner internally reassigns
      # GOCOVERDIR per-test and folds those subprocess counters into
      # the textfmt coverprofile automatically — no explicit
      # `covdata textfmt` step needed.
      #
      # Without this env var the helper skips `-cover` (avoids ~3x
      # build-time penalty during local `go test` runs) and the
      # dispatch wrappers stay at 0% — hence the prior 82% gate.
      - name: Test with coverage
        env:
          GOCOVERDIR: covdata
        run: |
          mkdir -p covdata
          go test ./... -coverprofile=cover.out -timeout 180s

      # Coverage gate progression: 83% (v0.5.0 dip) → 84% (v0.6.0 #200,
      # #215, #216, #218 — subprocess-coverage tests for the runXxxCLI
      # dispatch paths) → 85% (v0.7.0 #221 — split downloadAndSwap into
      # an inner downloadAndInstallAt that's exercised against
      # httptest.Server, plus a goInstallRunner indirection so the
      # `go install` exec call can be unit-tested without shelling out).
      #
      # Local Linux measures 85.2% post-#221. The 0.2pt headroom over
      # the 85.0 floor leaves margin for OS-specific branches that
      # don't fire on Linux (the Windows .exe.old move-aside path in
      # downloadAndInstallAt) so this gate doesn't become flaky on
      # the macOS / windows runners — those report at the same
      # number ±0.1 typically because the tests themselves cover
      # those branches via runtime.GOOS guards.
      - name: Check coverage threshold (85%)
        run: |
          TOTAL=$(go tool cover -func=cover.out | grep "^total" | awk '{print $3}' | tr -d '%')
          echo "Total coverage: ${TOTAL}%"
          awk -v t="$TOTAL" 'BEGIN { if (t+0 < 85) { print "Coverage " t "% is below 85% threshold"; exit 1 } }'

  # corpus-snapshot exercises the Makefile-driven snapshot pipeline (#33).
  # The Go-test gate (TestCorpusSnapshot_* in cmd/pinch/snapshot_test.go)
  # already covers the same diff logic, but this job additionally proves
  # the make + jq pipeline stays runnable — catches Makefile breakage and
  # missing dependencies that the Go tests would silently miss.
  #
  # ubuntu-only: jq isn't available by default on the Windows runner, and
  # the Go-side test gate covers cross-platform behaviour anyway.
  corpus-snapshot:
    name: Corpus snapshot
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify pinned-corpus snapshots
        run: make corpus-test

  # #642: validate the release-channel detection rule. Tiny shell test
  # exercises the modulo-10 rule + pre-release suffixes so a future
  # workflow edit can't silently break the dev/stable promotion pattern.
  release-channel:
    name: Release channel rule
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify channel detection
        run: bash scripts/release-channel_test.sh

  # bench-smoke runs the #50 benchmark harness at a small benchtime to
  # prove benchmarks stay COMPILABLE and don't crash. Always required.
  bench-smoke:
    name: Benchmark smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run benchmarks (smoke only — 100ms per benchmark)
        run: |
          go test ./internal/index/ -run=^$ -bench=. -benchtime=100ms -benchmem
          go test ./internal/server/ -run=^$ -bench=. -benchtime=100ms -benchmem

  # bench-regression removed in v0.55 (#681 Bucket B). The job ran with
  # continue-on-error: true and failed on most PRs (variance on shared
  # runners). Always-red advisory check polluted the per-PR check view
  # without ever blocking, so reviewers learned to ignore it — the
  # signal-to-noise ratio went to zero.
  #
  # Decision matrix:
  #   - PROMOTE TO REQUIRED → needs N≥20 variance dataset across multiple
  #     weeks (per project memory `feedback_bench_gate_promotion.md`),
  #     plus ongoing maintenance to keep BENCH_EXCLUDE current. Months
  #     since the gate was created; the dataset never got captured.
  #   - REMOVE → -1 always-red CI line per PR; lose perf-watching value
  #     (already advisory anyway). Compile-test of new bench code is
  #     covered by `bench-smoke` (above), which runs at 100ms/bench and
  #     IS required.
  #   - MOVE TO SCHEDULED → run weekly via cron, post to dashboard.
  #     Defers the cleanup to a future PR (worth filing as #681 phase 2
  #     follow-up if perf-watching value is missed).
  #
  # Chose REMOVE. `make corpus-bench` + `cmd/benchcmp` survive for local
  # use when a contributor wants to validate a perf-sensitive change
  # before pushing. Baselines under `testdata/bench/` stay committed for
  # local comparison and as a re-promotion starting point if we ever
  # capture the variance dataset.
