name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            test-flags: -timeout 120s
          - os: macos-latest
            test-flags: -timeout 120s
          - os: windows-latest
            # Windows SQLite I/O is ~10x slower; serialize package execution
            test-flags: -timeout 300s -p 1

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./... ${{ matrix.test-flags }}

      - name: Build
        run: go build ./cmd/pinch/

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # Subprocess-coverage instrumentation (#185): tests in cmd/pinch
      # build pincher binaries on the fly and exec them via exec.Cmd to
      # exercise runXxxCLI dispatch wrappers. The `buildPincherBinary`
      # helper checks `os.Getenv("GOCOVERDIR")` — when set, it builds
      # the binary with `-cover -coverpkg=./...` so subprocesses emit
      # raw counter files. Go's test runner internally reassigns
      # GOCOVERDIR per-test and folds those subprocess counters into
      # the textfmt coverprofile automatically — no explicit
      # `covdata textfmt` step needed.
      #
      # Without this env var the helper skips `-cover` (avoids ~3x
      # build-time penalty during local `go test` runs) and the
      # dispatch wrappers stay at 0% — hence the prior 82% gate.
      - name: Test with coverage
        env:
          GOCOVERDIR: covdata
        run: |
          mkdir -p covdata
          go test ./... -coverprofile=cover.out -timeout 180s

      # Coverage gate restored 83% → 84% in v0.6.0 (#200). The original
      # pre-#92 floor was 84%; v0.5.0 dipped to 83% to land the P0 bug
      # fix without scope creep. The v0.6.0 push (#215, #216, #218) added
      # subprocess-coverage tests for runInitCLI / runStatsCLI / runWebCLI
      # / runDoctorCLI / runIndexCLI dispatch paths and brought the
      # number to 84.3% on Linux CI.
      #
      # The remaining gap to 85%+ is concentrated in main()'s
      # HTTP/MCP server bootstrap and the network-bound update paths
      # (downloadAndSwap, runGoInstall) — both genuinely hard to test
      # without restructuring main() to make the bootstrap testable as
      # a unit, and without mocking github releases. Tracked separately;
      # not blocking the v0.6.0 cut.
      - name: Check coverage threshold (84%)
        run: |
          TOTAL=$(go tool cover -func=cover.out | grep "^total" | awk '{print $3}' | tr -d '%')
          echo "Total coverage: ${TOTAL}%"
          awk -v t="$TOTAL" 'BEGIN { if (t+0 < 84) { print "Coverage " t "% is below 84% threshold"; exit 1 } }'

  # corpus-snapshot exercises the Makefile-driven snapshot pipeline (#33).
  # The Go-test gate (TestCorpusSnapshot_* in cmd/pinch/snapshot_test.go)
  # already covers the same diff logic, but this job additionally proves
  # the make + jq pipeline stays runnable — catches Makefile breakage and
  # missing dependencies that the Go tests would silently miss.
  #
  # ubuntu-only: jq isn't available by default on the Windows runner, and
  # the Go-side test gate covers cross-platform behaviour anyway.
  corpus-snapshot:
    name: Corpus snapshot
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify pinned-corpus snapshots
        run: make corpus-test

  # bench-smoke runs the #50 benchmark harness at a small benchtime to
  # prove benchmarks stay COMPILABLE and don't crash. Always required.
  bench-smoke:
    name: Benchmark smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run benchmarks (smoke only — 100ms per benchmark)
        run: |
          go test ./internal/index/ -run=^$ -bench=. -benchtime=100ms -benchmem
          go test ./internal/server/ -run=^$ -bench=. -benchtime=100ms -benchmem

  # bench-regression gates ns/op + allocs/op against the committed
  # baselines under testdata/bench/ (#50).
  #
  # Baselines captured on ubuntu-latest (AMD EPYC 7763, 4-core runner)
  # via the bench-ci-actual artifact from a green run.
  #
  # CI variance characterised at testdata/bench/variance-ci-2026-05-09.md
  # — 10-iteration manual run (workflow_dispatch from #166): 20 of 21
  # benchmarks at <10% CV, 1 noisy outlier at 21.5%
  # (`Index_Incremental_NoChange_GoProject`, I/O-bound). Confirms the
  # 0.30/0.45 threshold range is roughly right for the typical case;
  # re-promotion to required gate still waits on a second multi-run
  # confirmation that the outlier doesn't repeat.
  #
  # Reverted to advisory after #160's promotion immediately blocked a
  # docs-only PR (#161): Index_Cold_NodeMonorepo +109% and
  # Incremental_NoChange_K8sOps +276% in a single outlier run that no
  # source change could plausibly explain. CI runner variance is wider
  # than three green runs let us measure.
  #
  # The job uploads the CI-actual bench output as a separate artifact
  # (`bench-ci-actual-*`) so any green run's numbers can become the
  # next baseline; that's the substrate for both re-baselining and
  # variance characterisation.
  bench-regression:
    name: Benchmark regression (advisory)
    runs-on: ubuntu-latest
    continue-on-error: true
    env:
      # CI-baseline thresholds. Slightly above local-dev defaults
      # (0.20/0.30) to absorb runner-to-runner variance.
      BENCH_NS_THRESHOLD: "0.30"
      BENCH_ALLOCS_THRESHOLD: "0.45"
      # Excluded benchmarks — observed unstable on CI:
      #
      # - Index_Incremental_NoChange_GoProject — 21.5% CV per
      #   testdata/bench/variance-ci-2026-05-09.md (I/O-bound, FS
      #   cache fluctuation).
      #
      # - Auth_TimingProfile/* — tiny ns/op (4-100k ns) measuring
      #   constant-time auth. Within-run CV is <1% (variance data),
      #   but the *absolute* ns shifts 2x across CI runner-pool
      #   reallocations (committed baseline 48k ns, recent runs
      #   100k+ ns). Any percentage gate on single-digit-microsecond
      #   benchmarks turns small absolute jitter into huge
      #   percentage deltas.
      #
      # Excluded benches still appear in the output with [EXCLUDED]
      # marker, so a regression that masks a real bug is still
      # visible to a human reading the action log.
      BENCH_EXCLUDE: "BenchmarkIndex_Incremental_NoChange_GoProject,BenchmarkAuth_TimingProfile/correct,BenchmarkAuth_TimingProfile/wrong_first_byte,BenchmarkAuth_TimingProfile/wrong_last_byte,BenchmarkAuth_TimingProfile/wrong_long_prefix_match,BenchmarkAuth_TimingProfile/wrong_same_length,BenchmarkAuth_TimingProfile/wrong_short"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Capture CI bench output for re-baselining
        run: |
          mkdir -p ci-bench-actual
          go test ./internal/index/ -run='^$' -bench=. -benchtime=2s -benchmem \
            > ci-bench-actual/index.bench.txt
          go test ./internal/server/ -run='^$' -bench=. -benchtime=2s -benchmem \
            > ci-bench-actual/server.bench.txt

      - name: Compare against committed baseline (sanity gate)
        run: |
          go run ./cmd/benchcmp \
            -ns-threshold=$BENCH_NS_THRESHOLD \
            -allocs-threshold=$BENCH_ALLOCS_THRESHOLD \
            -exclude="$BENCH_EXCLUDE" \
            testdata/bench/index.bench.txt ci-bench-actual/index.bench.txt
          go run ./cmd/benchcmp \
            -ns-threshold=$BENCH_NS_THRESHOLD \
            -allocs-threshold=$BENCH_ALLOCS_THRESHOLD \
            -exclude="$BENCH_EXCLUDE" \
            testdata/bench/server.bench.txt ci-bench-actual/server.bench.txt

      - name: Upload CI-actual bench output (for re-baselining)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bench-ci-actual-${{ github.run_id }}
          path: ci-bench-actual/
          retention-days: 30
