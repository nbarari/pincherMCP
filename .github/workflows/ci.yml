name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            test-flags: -timeout 120s
          - os: macos-latest
            test-flags: -timeout 120s
          - os: windows-latest
            # Windows SQLite I/O is ~10x slower; serialize package execution
            test-flags: -timeout 300s -p 1

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./... ${{ matrix.test-flags }}

      - name: Build
        run: go build ./cmd/pinch/

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Test with coverage
        run: go test ./... -coverprofile=cover.out -timeout 120s

      - name: Check coverage threshold (83%)
        run: |
          TOTAL=$(go tool cover -func=cover.out | grep "^total" | awk '{print $3}' | tr -d '%')
          echo "Total coverage: ${TOTAL}%"
          awk -v t="$TOTAL" 'BEGIN { if (t+0 < 83) { print "Coverage " t "% is below 83% threshold"; exit 1 } }'

  # corpus-snapshot exercises the Makefile-driven snapshot pipeline (#33).
  # The Go-test gate (TestCorpusSnapshot_* in cmd/pinch/snapshot_test.go)
  # already covers the same diff logic, but this job additionally proves
  # the make + jq pipeline stays runnable — catches Makefile breakage and
  # missing dependencies that the Go tests would silently miss.
  #
  # ubuntu-only: jq isn't available by default on the Windows runner, and
  # the Go-side test gate covers cross-platform behaviour anyway.
  corpus-snapshot:
    name: Corpus snapshot
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify pinned-corpus snapshots
        run: make corpus-test

  # bench-smoke runs the #50 benchmark harness at a small benchtime to
  # prove benchmarks stay COMPILABLE and don't crash. Always required.
  bench-smoke:
    name: Benchmark smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run benchmarks (smoke only — 100ms per benchmark)
        run: |
          go test ./internal/index/ -run=^$ -bench=. -benchtime=100ms -benchmem
          go test ./internal/server/ -run=^$ -bench=. -benchtime=100ms -benchmem

  # bench-regression gates ns/op + allocs/op against the committed
  # baselines under testdata/bench/ (#50). Thresholds: +20% ns, +30% allocs.
  #
  # `continue-on-error: true` is intentional during phase 1: baselines were
  # captured on a developer machine and may differ from GitHub-hosted
  # runner hardware by more than the 20% noise floor for some benchmarks.
  # The job surfaces deltas in the action log; an advisory failure here is
  # NOT a hard merge gate yet. To tighten:
  #   1. Observe several CI runs to characterise runner variance
  #   2. Either re-baseline via `make corpus-bench-update` on a CI run, OR
  #      widen thresholds in cmd/benchcmp/main.go
  #   3. Remove `continue-on-error: true` here.
  bench-regression:
    name: Benchmark regression (advisory)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run regression gate
        run: make corpus-bench

      - name: Upload actual numbers
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bench-actual-${{ github.run_id }}
          path: testdata/bench/
          retention-days: 14
