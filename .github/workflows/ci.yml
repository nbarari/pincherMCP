name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            test-flags: -timeout 120s
          - os: macos-latest
            test-flags: -timeout 120s
          - os: windows-latest
            # Windows SQLite I/O is ~10x slower; serialize package execution
            test-flags: -timeout 300s -p 1

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./... ${{ matrix.test-flags }}

      - name: Build
        run: go build ./cmd/pinch/

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Test with coverage
        run: go test ./... -coverprofile=cover.out -timeout 120s

      - name: Check coverage threshold (84%)
        run: |
          TOTAL=$(go tool cover -func=cover.out | grep "^total" | awk '{print $3}' | tr -d '%')
          echo "Total coverage: ${TOTAL}%"
          awk -v t="$TOTAL" 'BEGIN { if (t+0 < 84) { print "Coverage " t "% is below 84% threshold"; exit 1 } }'

  # corpus-snapshot exercises the Makefile-driven snapshot pipeline (#33).
  # The Go-test gate (TestCorpusSnapshot_* in cmd/pinch/snapshot_test.go)
  # already covers the same diff logic, but this job additionally proves
  # the make + jq pipeline stays runnable — catches Makefile breakage and
  # missing dependencies that the Go tests would silently miss.
  #
  # ubuntu-only: jq isn't available by default on the Windows runner, and
  # the Go-side test gate covers cross-platform behaviour anyway.
  corpus-snapshot:
    name: Corpus snapshot
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify pinned-corpus snapshots
        run: make corpus-test

  # bench-smoke runs the #50 benchmark harness at a small benchtime to
  # prove benchmarks stay COMPILABLE and don't crash. Always required.
  bench-smoke:
    name: Benchmark smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run benchmarks (smoke only — 100ms per benchmark)
        run: |
          go test ./internal/index/ -run=^$ -bench=. -benchtime=100ms -benchmem
          go test ./internal/server/ -run=^$ -bench=. -benchtime=100ms -benchmem

  # bench-regression gates ns/op + allocs/op against the committed
  # baselines under testdata/bench/ (#50).
  #
  # Baselines captured on ubuntu-latest (AMD EPYC 7763, 4-core runner)
  # via the bench-ci-actual artifact from a green run.
  #
  # CI variance characterised at testdata/bench/variance-ci-2026-05-09.md
  # — 10-iteration manual run (workflow_dispatch from #166): 20 of 21
  # benchmarks at <10% CV, 1 noisy outlier at 21.5%
  # (`Index_Incremental_NoChange_GoProject`, I/O-bound). Confirms the
  # 0.30/0.45 threshold range is roughly right for the typical case;
  # re-promotion to required gate still waits on a second multi-run
  # confirmation that the outlier doesn't repeat.
  #
  # Reverted to advisory after #160's promotion immediately blocked a
  # docs-only PR (#161): Index_Cold_NodeMonorepo +109% and
  # Incremental_NoChange_K8sOps +276% in a single outlier run that no
  # source change could plausibly explain. CI runner variance is wider
  # than three green runs let us measure.
  #
  # The job uploads the CI-actual bench output as a separate artifact
  # (`bench-ci-actual-*`) so any green run's numbers can become the
  # next baseline; that's the substrate for both re-baselining and
  # variance characterisation.
  bench-regression:
    name: Benchmark regression (advisory)
    runs-on: ubuntu-latest
    continue-on-error: true
    env:
      # CI-baseline thresholds. Slightly above local-dev defaults
      # (0.20/0.30) to absorb runner-to-runner variance — but as #161
      # showed, even this is too tight on outlier runs. Widening
      # without variance data would just push the gate toward
      # meaninglessness.
      BENCH_NS_THRESHOLD: "0.30"
      BENCH_ALLOCS_THRESHOLD: "0.45"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Capture CI bench output for re-baselining
        run: |
          mkdir -p ci-bench-actual
          go test ./internal/index/ -run='^$' -bench=. -benchtime=2s -benchmem \
            > ci-bench-actual/index.bench.txt
          go test ./internal/server/ -run='^$' -bench=. -benchtime=2s -benchmem \
            > ci-bench-actual/server.bench.txt

      - name: Compare against committed baseline (sanity gate)
        run: |
          go run ./cmd/benchcmp \
            -ns-threshold=$BENCH_NS_THRESHOLD \
            -allocs-threshold=$BENCH_ALLOCS_THRESHOLD \
            testdata/bench/index.bench.txt ci-bench-actual/index.bench.txt
          go run ./cmd/benchcmp \
            -ns-threshold=$BENCH_NS_THRESHOLD \
            -allocs-threshold=$BENCH_ALLOCS_THRESHOLD \
            testdata/bench/server.bench.txt ci-bench-actual/server.bench.txt

      - name: Upload CI-actual bench output (for re-baselining)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bench-ci-actual-${{ github.run_id }}
          path: ci-bench-actual/
          retention-days: 30
